service: homemate-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: dev
  memorySize: 512
  timeout: 25
  environment:
    NODE_OPTIONS: --enable-source-maps
    HOME_TABLE: homemate-dev
    BEDROCK_REGION: us-east-1
    BEDROCK_MODEL_ID: amazon.nova-micro-v1:0

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
          Resource:
            - arn:aws:dynamodb:ap-south-1:*:table/homemate-dev

        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource:
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

functions:
  health:
    handler: src/handler.health
    events:
      - httpApi:
          path: /health
          method: GET

  signup:
    handler: src/handler.signup
    events:
      - httpApi:
          path: /auth/signup
          method: POST

  login:
    handler: src/handler.login
    events:
      - httpApi:
          path: /auth/login
          method: POST

  getHouseholdProfile:
    handler: src/handler.getHouseholdProfile
    events:
      - httpApi:
          path: /households/{householdId}/profile
          method: GET

  saveOnboarding:
    handler: src/handler.saveOnboarding
    events:
      - httpApi:
          path: /households/{householdId}/onboarding
          method: POST

  getOnboarding:
    handler: src/handler.getOnboarding
    events:
      - httpApi:
          path: /households/{householdId}/onboarding
          method: GET

  generateHomeRhythm:
    handler: src/handler.generateHomeRhythm
    events:
      - httpApi:
          path: /households/{householdId}/generate
          method: POST

  getDashboard:
    handler: src/handler.getDashboard
    events:
      - httpApi:
          path: /households/{householdId}/dashboard
          method: GET

  getRoutines:
    handler: src/handler.getRoutines
    events:
      - httpApi:
          path: /households/{householdId}/routines
          method: GET

  getTimeline:
    handler: src/handler.getTimeline
    events:
      - httpApi:
          path: /households/{householdId}/timeline
          method: GET

  getRhythm:
    handler: src/handler.getRhythm
    events:
      - httpApi:
          path: /households/{householdId}/rhythm
          method: GET

resources:
  Resources:
    HomeMateTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: homemate-dev
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

plugins:
  - serverless-offline
