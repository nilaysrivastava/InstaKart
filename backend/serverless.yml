service: hackon6-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: dev
  memorySize: 512
  timeout: 25
  environment:
    NODE_OPTIONS: --enable-source-maps
    ITEMS_TABLE: hackon6-items-dev
    BEDROCK_REGION: us-east-1
    BEDROCK_PLANNER_MODEL_ID: ${env:BEDROCK_PLANNER_MODEL_ID, 'amazon.nova-pro-v1:0'}
    BEDROCK_FALLBACK_MODEL_ID: amazon.nova-pro-v1:0
    BEDROCK_FAST_MODEL_ID: amazon.nova-micro-v1:0

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
          Resource:
            - arn:aws:dynamodb:ap-south-1:*:table/hackon6-items-dev
            - arn:aws:dynamodb:ap-south-1:*:table/hackon6-items-dev/index/*

        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource:
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-text-express-v1
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v1

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

functions:
  health:
    handler: src/handler.health
    events:
      - httpApi:
          path: /health
          method: GET

  createItem:
    handler: src/handler.createItem
    events:
      - httpApi:
          path: /items
          method: POST

  listItems:
    handler: src/handler.listItems
    events:
      - httpApi:
          path: /items
          method: GET

  askBedrock:
    handler: src/handler.askBedrock
    events:
      - httpApi:
          path: /ask
          method: POST

  seedNowInventory:
    handler: src/handler.seedNowInventory
    events:
      - httpApi:
          path: /now/seed
          method: POST

  generateNowPlan:
    handler: src/handler.generateNowPlan
    timeout: 29
    memorySize: 1024
    events:
      - httpApi:
          path: /now/plan
          method: POST

  checkoutNowOrder:
    handler: src/handler.checkoutNowOrder
    events:
      - httpApi:
          path: /now/checkout
          method: POST

  listNowOrders:
    handler: src/handler.listNowOrders
    events:
      - httpApi:
          path: /now/orders
          method: GET

  saveNowFeedback:
    handler: src/handler.saveNowFeedback
    events:
      - httpApi:
          path: /now/feedback
          method: POST

  listNowProducts:
    handler: src/handler.listNowProducts
    events:
      - httpApi:
          path: /now/products
          method: GET

plugins:
  - serverless-offline
