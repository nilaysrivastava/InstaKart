service: hackon6-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: dev
  memorySize: 512
  timeout: 25
  environment:
    NODE_OPTIONS: --enable-source-maps
    ITEMS_TABLE: hackon6-items-dev
    BEDROCK_REGION: us-east-1
    BEDROCK_PLANNER_MODEL_ID: ${env:BEDROCK_PLANNER_MODEL_ID, 'amazon.nova-pro-v1:0'}
    BEDROCK_FALLBACK_MODEL_ID: ${env:BEDROCK_FALLBACK_MODEL_ID, 'amazon.nova-micro-v1:0'}
    BEDROCK_FAST_MODEL_ID: amazon.nova-micro-v1:0
    BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_USER_POOL_CLIENT_ID: ${env:COGNITO_USER_POOL_CLIENT_ID}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
            - dynamodb:TransactWriteItems
          Resource:
            - arn:aws:dynamodb:ap-south-1:*:table/hackon6-items-dev
            - arn:aws:dynamodb:ap-south-1:*:table/hackon6-items-dev/index/*

        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource:
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-text-express-v1
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v1
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - http://127.0.0.1:3000
        - https://main.d2a6skx8ok931x.amplifyapp.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/${env:COGNITO_USER_POOL_ID}
        audience:
          - ${env:COGNITO_USER_POOL_CLIENT_ID}

functions:
  health:
    handler: src/handler.health
    events:
      - httpApi:
          path: /health
          method: GET

  createItem:
    handler: src/handler.createItem
    events:
      - httpApi:
          path: /items
          method: POST

  listItems:
    handler: src/handler.listItems
    events:
      - httpApi:
          path: /items
          method: GET

  askBedrock:
    handler: src/handler.askBedrock
    events:
      - httpApi:
          path: /ask
          method: POST

  seedNowInventory:
    handler: src/handler.seedNowInventory
    events:
      - httpApi:
          path: /now/seed
          method: POST

  generateNowPlan:
    handler: src/handler.generateNowPlan
    timeout: 29
    memorySize: 1024
    events:
      - httpApi:
          path: /now/plan
          method: POST
          authorizer:
            name: cognitoJwt

  generateGuestNowPlan:
    handler: src/handler.generateGuestNowPlan
    timeout: 29
    memorySize: 1024
    events:
      - httpApi:
          path: /now/plan/guest
          method: POST

  checkoutNowOrder:
    handler: src/handler.checkoutNowOrder
    events:
      - httpApi:
          path: /now/checkout
          method: POST
          authorizer:
            name: cognitoJwt

  listNowOrders:
    handler: src/handler.listNowOrders
    events:
      - httpApi:
          path: /now/orders
          method: GET
          authorizer:
            name: cognitoJwt

  trackNowOrder:
    handler: src/handler.trackNowOrder
    events:
      - httpApi:
          path: /now/orders/{orderId}/track
          method: GET
          authorizer:
            name: cognitoJwt

  saveNowFeedback:
    handler: src/handler.saveNowFeedback
    events:
      - httpApi:
          path: /now/feedback
          method: POST
          authorizer:
            name: cognitoJwt

  getNowCart:
    handler: src/handler.getNowCart
    events:
      - httpApi:
          path: /now/cart
          method: GET
          authorizer:
            name: cognitoJwt

  saveNowCart:
    handler: src/handler.saveNowCart
    events:
      - httpApi:
          path: /now/cart
          method: PUT
          authorizer:
            name: cognitoJwt

  clearNowCart:
    handler: src/handler.clearNowCart
    events:
      - httpApi:
          path: /now/cart
          method: DELETE
          authorizer:
            name: cognitoJwt

  listAdminInventory:
    handler: src/handler.listAdminInventory
    events:
      - httpApi:
          path: /admin/inventory
          method: GET
          authorizer:
            name: cognitoJwt

  createAdminInventory:
    handler: src/handler.createAdminInventory
    events:
      - httpApi:
          path: /admin/inventory
          method: POST
          authorizer:
            name: cognitoJwt

  updateAdminInventory:
    handler: src/handler.updateAdminInventory
    events:
      - httpApi:
          path: /admin/inventory/{id}
          method: PATCH
          authorizer:
            name: cognitoJwt

  deleteAdminInventory:
    handler: src/handler.deleteAdminInventory
    events:
      - httpApi:
          path: /admin/inventory/{id}
          method: DELETE
          authorizer:
            name: cognitoJwt

  getAdminAnalytics:
    handler: src/handler.getAdminAnalytics
    events:
      - httpApi:
          path: /admin/analytics
          method: GET
          authorizer:
            name: cognitoJwt

  generateAdminInsights:
    handler: src/handler.generateAdminInsights
    timeout: 29
    events:
      - httpApi:
          path: /admin/analytics/insights
          method: POST
          authorizer:
            name: cognitoJwt

  listNowProducts:
    handler: src/handler.listNowProducts
    events:
      - httpApi:
          path: /now/products
          method: GET

  embedProducts:
    handler: src/handler.embedProducts
    timeout: 29
    memorySize: 1024
    events:
      - httpApi:
          path: /now/embed-products
          method: POST

plugins:
  - serverless-offline
